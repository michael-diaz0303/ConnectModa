# config/nginx/nginx.prod.conf
# Nginx producción — HTTPS + rate limiting + seguridad

upstream connectmoda_app {
    server app:5000;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name connectmoda.co www.connectmoda.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name connectmoda.co www.connectmoda.co;

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/connectmoda.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/connectmoda.co/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Tamaño máximo de body (imágenes de productos)
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Headers de seguridad (OWASP)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;

    # Logs
    access_log /var/log/nginx/connectmoda_access.log combined;
    error_log  /var/log/nginx/connectmoda_error.log warn;

    # Ocultar versión de Nginx
    server_tokens off;

    # Endpoints de autenticación — rate limit estricto
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth burst=5 nodelay;
        limit_conn addr 5;
        proxy_pass         http://connectmoda_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Webhooks de Stripe — sin rate limit (Stripe tiene IPs fijas)
    location /api/pagos/webhook {
        proxy_pass         http://connectmoda_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Preservar body raw para verificación de firma Stripe
        proxy_set_header   Content-Type $content_type;
    }

    # API general — rate limit moderado
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://connectmoda_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Archivos estáticos con caché agresiva
    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Health check sin rate limit (para balanceadores)
    location = /api/health {
        proxy_pass http://connectmoda_app;
        access_log off;
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    # Respuesta para raíz
    location / {
        return 200 '{"status":"ok","service":"ConnectModa API","version":"1.0"}';
        add_header Content-Type application/json;
    }
}
