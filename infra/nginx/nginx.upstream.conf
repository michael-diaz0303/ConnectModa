# nginx/conf.d/upstream.conf
# ConnectModa — Load Balancer con Nginx
# Distribuye tráfico entre N instancias del backend

# ─── Rate limiting zones ──────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=api_global:20m  rate=60r/m;
limit_req_zone  $binary_remote_addr zone=auth_strict:10m rate=10r/m;
limit_req_zone  $binary_remote_addr zone=uploads:10m     rate=5r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

# ─── Upstream — instancias de la API ─────────────────────────────────────────
# least_conn: envía al servidor con menos conexiones activas
upstream connectmoda_api {
    least_conn;

    # Instancias de la app (actualizar IPs según tu infraestructura)
    server app-1:5000 weight=1 max_fails=3 fail_timeout=30s;
    server app-2:5000 weight=1 max_fails=3 fail_timeout=30s;
    server app-3:5000 weight=1 max_fails=3 fail_timeout=30s;

    # Instancias de backup (solo reciben tráfico si las principales fallan)
    server app-4:5000 backup;
    server app-5:5000 backup;

    # Keepalive — reutilizar conexiones TCP
    keepalive 64;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# ─── Upstream para WebSockets (sticky sessions por IP) ────────────────────────
upstream connectmoda_ws {
    ip_hash;   # Mismo cliente siempre va al mismo servidor
    server app-1:5000;
    server app-2:5000;
    server app-3:5000;
}

# ─── Caché para respuestas GET públicas ───────────────────────────────────────
proxy_cache_path /var/cache/nginx/api
    levels=1:2
    keys_zone=api_cache:10m
    max_size=500m
    inactive=60m
    use_temp_path=off;

# ─── Servidor principal HTTP → HTTPS redirect ─────────────────────────────────
server {
    listen 80;
    server_name connectmoda.co www.connectmoda.co;
    return 301 https://$host$request_uri;
}

# ─── Servidor principal HTTPS ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name connectmoda.co www.connectmoda.co;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 15M;
    server_tokens off;

    access_log /var/log/nginx/connectmoda_access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/connectmoda_error.log warn;

    # ── WebSocket (tiempo real / notificaciones) ──────────────────────────────
    location /ws/ {
        proxy_pass          http://connectmoda_ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Auth endpoints — rate limit estricto ─────────────────────────────────
    location ~ ^/api/auth/(login|register|refresh) {
        limit_req  zone=auth_strict burst=5 nodelay;
        limit_conn perip 10;

        proxy_pass         http://connectmoda_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # ── Upload de imágenes ───────────────────────────────────────────────────
    location /api/productos/upload {
        limit_req zone=uploads burst=3 nodelay;

        proxy_pass              http://connectmoda_api;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_request_buffering off;
        proxy_read_timeout      120s;
    }

    # ── Stripe webhooks — sin rate limit, body raw ────────────────────────────
    location = /api/pagos/webhook {
        proxy_pass         http://connectmoda_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Content-Type $content_type;
        proxy_read_timeout 30s;
    }

    # ── API general con caché para GETs públicos ──────────────────────────────
    location /api/productos {
        limit_req zone=api_global burst=30 nodelay;

        # Caché solo para GET sin Authorization
        set $no_cache 0;
        if ($request_method != GET)       { set $no_cache 1; }
        if ($http_authorization != "")    { set $no_cache 1; }
        if ($arg_nocache != "")           { set $no_cache 1; }

        proxy_cache            api_cache;
        proxy_cache_bypass     $no_cache;
        proxy_no_cache         $no_cache;
        proxy_cache_valid      200 2m;
        proxy_cache_valid      404 30s;
        proxy_cache_key        "$scheme$host$request_uri";
        proxy_cache_lock       on;
        proxy_cache_use_stale  error timeout updating http_500 http_502 http_503;
        add_header             X-Cache-Status $upstream_cache_status;

        proxy_pass             http://connectmoda_api;
        proxy_http_version     1.1;
        proxy_set_header       Connection "";
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;

        proxy_next_upstream    error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # ── API general ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req  zone=api_global burst=20 nodelay;
        limit_conn perip 20;

        proxy_pass         http://connectmoda_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID $request_id;

        proxy_connect_timeout  10s;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;

        proxy_next_upstream    error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
    }

    # ── Health check del load balancer ────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 '{"status":"ok","lb":"nginx"}';
        add_header Content-Type application/json;
    }

    # ── Métricas Nginx para Prometheus ────────────────────────────────────────
    location = /nginx_status {
        stub_status on;
        allow 10.0.0.0/8;    # Solo red interna
        allow 172.16.0.0/12;
        deny all;
        access_log off;
    }

    # ── Archivos estáticos con CDN headers ────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        proxy_pass http://connectmoda_api;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
    }

    # ── Bloquear archivos sensibles ───────────────────────────────────────────
    location ~ /\.(env|git|htaccess|DS_Store) {
        deny all;
        return 404;
    }
}
