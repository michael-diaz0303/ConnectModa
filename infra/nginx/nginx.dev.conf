# config/nginx/nginx.dev.conf
# Nginx como reverse proxy local para desarrollo

upstream connectmoda_app {
    server app:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # Logs
    access_log /var/log/nginx/connectmoda_access.log;
    error_log  /var/log/nginx/connectmoda_error.log;

    # Tamaño máximo de upload (imágenes de productos)
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Headers de seguridad básicos
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Proxy al backend Node.js
    location /api/ {
        proxy_pass         http://connectmoda_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check directo
    location /health {
        proxy_pass http://connectmoda_app/api/health;
    }

    # Archivos estáticos (uploads)
    location /uploads/ {
        alias /app/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Default
    location / {
        return 200 '{"status":"ok","service":"ConnectModa API","env":"development"}';
        add_header Content-Type application/json;
    }
}
