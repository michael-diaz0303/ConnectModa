# docker-compose.production.yml — Production environment

version: '3.9'

networks:
  connectmoda-prod:
    driver: bridge

volumes:
  mongodb-prod:
  redis-prod:
  uploads-prod:
  nginx-certs:

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}/connectmoda-backend:production-latest
    container_name: connectmoda-prod-app
    restart: always
    expose:
      - '5000'
    env_file: .env.production
    volumes:
      - uploads-prod:/app/uploads
    depends_on:
      - mongo
      - redis
    networks:
      - connectmoda-prod
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  mongo:
    image: mongo:7.0-jammy
    container_name: connectmoda-prod-mongo
    restart: always
    env_file: .env.production
    volumes:
      - mongodb-prod:/data/db
    networks:
      - connectmoda-prod
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: connectmoda-prod-redis
    restart: always
    volumes:
      - redis-prod:/data
      - ./docker/redis.conf:/etc/redis/redis.conf:ro
    command: ['redis-server', '/etc/redis/redis.conf', '--requirepass', '${REDIS_PASSWORD}']
    networks:
      - connectmoda-prod

  nginx:
    image: nginx:1.25-alpine
    container_name: connectmoda-prod-nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./config/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-certs:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - connectmoda-prod
