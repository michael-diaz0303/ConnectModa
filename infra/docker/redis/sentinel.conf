# docker/redis/sentinel.conf
# Redis Sentinel — detecta caída del master y promueve una replica
# ConnectModa

port 26379
bind 0.0.0.0
protected-mode no

# Nombre del master a monitorear
# quorum=2: necesita 2 sentinels para declarar master como caído
sentinel monitor connectmoda-master redis-master 6379 2

# Autenticación del master
sentinel auth-pass connectmoda-master ${REDIS_PASSWORD}

# Tiempo sin respuesta para considerar el master como caído (ms)
sentinel down-after-milliseconds connectmoda-master 5000

# Tiempo para completar el failover (ms)
sentinel failover-timeout connectmoda-master 60000

# Réplicas que pueden ser promovidas simultáneamente durante failover
sentinel parallel-syncs connectmoda-master 1

# Notificación cuando ocurre un evento
sentinel notification-script connectmoda-master /etc/redis/notify.sh

logfile /var/log/redis/sentinel.log
loglevel notice
