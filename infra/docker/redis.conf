# docker/redis.conf
# Configuración Redis para ConnectModa

# Persistencia — guardar snapshot cada 60s si hubo 1+ cambios
save 60 1
save 300 10
save 900 100

# Directorio de datos
dir /data

# Memoria máxima (ajustar según el servidor)
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logs
loglevel notice

# Nombre del proceso
# (el password se pasa por variable de entorno en docker-compose.production.yml)
