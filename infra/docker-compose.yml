# docker-compose.yml — Entorno de desarrollo local
# Uso: docker-compose up -d

version: '3.9'

networks:
  connectmoda-network:
    driver: bridge

volumes:
  mongodb-data:
    driver: local
  redis-data:
    driver: local
  uploads-data:
    driver: local

services:
  # ─── APP ────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: production
    container_name: connectmoda-app
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/connectmoda_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dev}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_dev}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.ethereal.email}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - uploads-data:/app/uploads
      - ./logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - connectmoda-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── MONGODB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0-jammy
    container_name: connectmoda-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-connectmoda_pass}
      MONGO_INITDB_DATABASE: connectmoda_dev
    volumes:
      - mongodb-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - connectmoda-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: ['mongod', '--auth', '--bind_ip_all']

  # ─── REDIS ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: connectmoda-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
      - ./docker/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - connectmoda-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: ['redis-server', '/etc/redis/redis.conf']

  # ─── NGINX (reverse proxy local) ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: connectmoda-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./config/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - connectmoda-network
    profiles:
      - with-nginx  # Solo arrancar con: docker-compose --profile with-nginx up

  # ─── MONGO EXPRESS (UI para MongoDB — solo dev) ───────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: connectmoda-mongo-ui
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASS:-connectmoda_pass}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-connectmoda_pass}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: connectmoda123
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - connectmoda-network
    profiles:
      - with-ui
