# kubernetes/base/namespace.yml
apiVersion: v1
kind: Namespace
metadata:
  name: connectmoda
  labels:
    app: connectmoda
    managed-by: kubectl

---
# kubernetes/base/configmap.yml
apiVersion: v1
kind: ConfigMap
metadata:
  name: connectmoda-config
  namespace: connectmoda
data:
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "warn"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_AUTH_MAX: "20"
  JWT_EXPIRES_IN: "1d"
  JWT_REFRESH_EXPIRES_IN: "30d"
  CORS_ORIGINS: "https://connectmoda.co,https://www.connectmoda.co"
  SENTRY_ENVIRONMENT: "production"

---
# kubernetes/base/secret.yml
# ⚠️ En producción real usar Sealed Secrets, Vault o External Secrets Operator
# Valores en base64: echo -n "valor" | base64
apiVersion: v1
kind: Secret
metadata:
  name: connectmoda-secrets
  namespace: connectmoda
type: Opaque
stringData:
  JWT_SECRET: "REEMPLAZAR_CON_SECRET_REAL_64_CHARS"
  JWT_REFRESH_SECRET: "REEMPLAZAR_CON_REFRESH_SECRET_REAL"
  STRIPE_SECRET_KEY: "sk_live_REEMPLAZAR"
  STRIPE_WEBHOOK_SECRET: "whsec_REEMPLAZAR"
  MONGODB_URI: "mongodb+srv://user:pass@cluster.mongodb.net/connectmoda"
  REDIS_URL: "redis://:password@redis-master:6379"
  REDIS_PASSWORD: "REEMPLAZAR_REDIS_PASSWORD"
  EMAIL_USER: "apikey"
  EMAIL_PASS: "REEMPLAZAR_SENDGRID_KEY"
  SENTRY_DSN: "https://XXXX@oXXXX.ingest.sentry.io/XXXX"
  CLOUDINARY_API_KEY: "REEMPLAZAR"
  CLOUDINARY_API_SECRET: "REEMPLAZAR"
  CLOUDINARY_CLOUD_NAME: "connectmoda"
