# kubernetes/apps/gateway/ingress.yml
# Ingress con NGINX — enruta tráfico externo hacia los servicios internos
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: connectmoda-ingress
  namespace: connectmoda
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"

    # Rate limiting en el Ingress
    nginx.ingress.kubernetes.io/limit-rps: "60"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # Auth endpoints — más restrictivos
    nginx.ingress.kubernetes.io/server-snippet: |
      location ~* /api/auth/(login|register) {
        limit_req zone=auth burst=5 nodelay;
      }

    # Body size para uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://connectmoda.co"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"

spec:
  tls:
    - hosts:
        - connectmoda.co
        - www.connectmoda.co
        - api.connectmoda.co
      secretName: connectmoda-tls-cert

  rules:
    - host: api.connectmoda.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: connectmoda-api-svc
                port:
                  number: 80

    - host: connectmoda.co
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: connectmoda-api-svc
                port:
                  number: 80

---
# kubernetes/base/storage.yml
# PersistentVolume para uploads de imágenes compartido entre pods
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: connectmoda-uploads-pvc
  namespace: connectmoda
spec:
  accessModes:
    - ReadWriteMany    # Múltiples pods pueden leer y escribir
  storageClassName: nfs-storage   # Requiere NFS StorageClass en el cluster
  resources:
    requests:
      storage: 20Gi

---
# PVC para MongoDB
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: connectmoda-mongodb-pvc
  namespace: connectmoda
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd    # SSD para mejor performance de BD
  resources:
    requests:
      storage: 50Gi
