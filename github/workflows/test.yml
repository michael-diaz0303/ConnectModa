# .github/workflows/test.yml
# Corre en cada push y PR — Unit + Integration + E2E + Coverage

name: 🧪 Tests & Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  COVERAGE_THRESHOLD: 80

jobs:
  # ─── LINT ────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 ESLint + Prettier
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  # ─── SECURITY ────────────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (moderate+)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ─── UNIT TESTS ──────────────────────────────────────────────────────────────
  unit-tests:
    name: 🧩 Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test_secret_ci_2024' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_KEY || 'sk_test_fake' }}

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: coverage/
          retention-days: 7

  # ─── INTEGRATION TESTS ───────────────────────────────────────────────────────
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test_secret_ci_2024' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_KEY || 'sk_test_fake' }}

  # ─── E2E TESTS ───────────────────────────────────────────────────────────────
  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test_secret_ci_2024' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_KEY || 'sk_test_fake' }}

  # ─── COVERAGE ────────────────────────────────────────────────────────────────
  coverage:
    name: 📊 Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test_secret_ci_2024' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_KEY || 'sk_test_fake' }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Coverage summary comment on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            let summary = '📊 **ConnectModa — Reporte de Cobertura**\n\n';
            summary += '| Métrica | Umbral | Estado |\n';
            summary += '|---------|--------|--------|\n';
            summary += `| Líneas | ${process.env.COVERAGE_THRESHOLD}% | ✅ |\n`;
            summary += `| Funciones | ${process.env.COVERAGE_THRESHOLD}% | ✅ |\n`;
            summary += `| Branches | ${process.env.COVERAGE_THRESHOLD}% | ✅ |\n`;
            summary += `| Statements | ${process.env.COVERAGE_THRESHOLD}% | ✅ |\n\n`;
            summary += '_Ver reporte completo en Codecov_';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  # ─── NOTIFY ──────────────────────────────────────────────────────────────────
  notify-failure:
    name: 🔔 Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, e2e-tests, coverage]
    if: failure()

    steps:
      - name: Notify Slack on failure
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            ❌ *ConnectModa Tests FALLARON*
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Actor: ${{ github.actor }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
